<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Chess Demo</title>
  </head>
  <body>
    <section id="login-page" class="auth-page">
      <div class="auth-shell">
        <div class="auth-brand">
          <span class="swatch" aria-hidden="true"></span>
          <div>
            <h1>Nexus Chess</h1>
            <p>Sign in</p>
          </div>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            Email
            <input id="login-email" type="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input id="login-password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Login</button>
        </form>
        <p id="login-error" class="auth-error" aria-live="polite"></p>

        <button id="show-register-button" class="link-button" type="button">Create account</button>
      </div>
    </section>

    <section id="register-page" class="auth-page hidden">
      <div class="auth-shell">
        <div class="auth-brand">
          <span class="swatch" aria-hidden="true"></span>
          <div>
            <h1>Nexus Chess</h1>
            <p>Create account</p>
          </div>
        </div>

        <form id="register-form" class="auth-form">
          <label>
            Email
            <input id="register-email" type="email" autocomplete="email" required />
          </label>
          <label>
            Username
            <input id="register-username" type="text" autocomplete="username" required />
          </label>
          <div class="register-fields">
            <label>
              First
              <input id="register-first-name" type="text" autocomplete="given-name" required />
            </label>
            <label>
              Last
              <input id="register-last-name" type="text" autocomplete="family-name" required />
            </label>
          </div>
          <label>
            Password
            <input id="register-password" type="password" autocomplete="new-password" required />
          </label>
          <button type="submit">Register</button>
        </form>
        <p id="register-error" class="auth-error" aria-live="polite"></p>

        <button id="show-login-button" class="link-button" type="button">Back to login</button>
      </div>
    </section>

    <section id="game-page" class="shell hidden">
      <header class="toolbar">
        <div class="identity">
          <span id="client-color" class="swatch" aria-hidden="true"></span>
          <div>
            <h1>Nexus Chess</h1>
            <p id="client-label"></p>
          </div>
        </div>

        <div class="toolbar-actions">
          <button id="flip-button" type="button">Flip</button>
          <button id="reset-button" type="button">Reset</button>
          <button id="logout-button" type="button">Logout</button>
          <div class="status" aria-live="polite">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Disconnected</span>
          </div>
        </div>
      </header>

      <main class="stage">
        <section class="board-stage" aria-label="Shared chess board">
          <div class="board-shell">
            <div id="board"></div>
          </div>
        </section>

        <aside class="panel">
          <section>
            <h2>Session</h2>
            <dl>
              <div>
                <dt>Board</dt>
                <dd id="position-label">start</dd>
              </div>
              <div>
                <dt>Last event</dt>
                <dd id="last-event">none</dd>
              </div>
              <div>
                <dt>Moves</dt>
                <dd id="move-count">0</dd>
              </div>
            </dl>
          </section>

          <section>
            <h2>Events</h2>
            <ol id="log"></ol>
          </section>
        </aside>
      </main>
    </section>

    <script type="module" src="./main.js"></script>
  </body>
</html>
