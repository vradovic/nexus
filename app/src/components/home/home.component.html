<h2>Home</h2>
@if (profile(); as profile) {
<p>Logged in as: <b>{{ `${profile.firstName} ${profile.lastName}` }}</b></p>
}
<p>Welcome to Nexus Chess! Useful links and actions:</p>
<ul>
    @if (!isAuthenticated()) {
    <li><a routerLink="/login">Log in</a></li>
    <li><a routerLink="/register">Sign up</a></li>
    } @else {
    <li><button (click)="onLogOut()">Log out</button></li>
    }
</ul>
