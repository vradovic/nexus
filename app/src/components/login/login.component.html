<h2>Please log in</h2>
<form class="auth-form" (submit)="onSubmit($event)">
    <label>
        Email:
        <input type="email" [formField]="loginForm.email">
    </label>
    <label>
        Password:
        <input type="password" [formField]="loginForm.password">
    </label>
    <button type="submit">Login</button>
</form>
<a routerLink="/register">Sign up</a>
